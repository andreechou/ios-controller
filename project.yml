name: IOSController
options:
  bundleIdPrefix: md.chou.ioscontroller
  deploymentTarget:
    macOS: "15.0"   # janela flutuante (windowLevel/.plain) é API do 15+
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: "" # Personal Team — preencher se necessário
    CODE_SIGN_STYLE: Automatic

packages:
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk
    from: "0.11.0"

targets:
  # Lógica compartilhada entre app e CLI. Sem dependência de UI.
  # Static lib: sem bundle aninhado pra assinar (app/cli/mcp/tests só linkam).
  IOSControllerCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/IOSControllerCore

  # App nativo (SwiftUI/AppKit) — palette flutuante ao lado do Simulator
  # (estilo RocketSim) + janelas Steps e Atlas sob demanda.
  IOSController:
    type: application
    platform: macOS
    sources:
      - Sources/IOSControllerApp
    dependencies:
      - target: IOSControllerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.chou.ioscontroller.app
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: Sources/IOSControllerApp/Info.plist
      properties:
        CFBundleDisplayName: iOS Controller
        CFBundleName: iOS Controller
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true # WDA em localhost
        LSMinimumSystemVersion: "15.0"

  # Binário headless que compartilha IOSControllerCore — pra rodar em CI/Claude Code.
  ios-controller-cli:
    type: tool
    platform: macOS
    sources:
      - Sources/ios-controller-cli
    dependencies:
      - target: IOSControllerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.chou.ioscontroller.cli

  # Servidor MCP (stdio) — expõe o SimulatorDriver como tools pro Claude Code.
  ios-controller-mcp:
    type: tool
    platform: macOS
    sources:
      - Sources/ios-controller-mcp
    dependencies:
      - target: IOSControllerCore
      - package: MCP
        product: MCP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.chou.ioscontroller.mcp

  IOSControllerCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/IOSControllerCoreTests
    dependencies:
      - target: IOSControllerCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  IOSController:
    build:
      targets:
        IOSController: all
        ios-controller-cli: all
    run:
      config: Debug
    test:
      targets:
        - IOSControllerCoreTests
